short_bio_text_justify: false
short_bio: >-
  </p>
  I am an Associate Professor  at the <a href="https://www.sice.uestc.edu.cn/info/1451/16124.htm" target="_blank">University of Electronic Science and Technology of China</a>. 
  My research interests include radar signal processing, distributed radar sensing, non-line-of-sight (NLOS) target detection and imaging, through-wall sensing, and sparse optimization methods for radar applications.
  </p>
  My recent work focuses on NLOS target localization and imaging, low-intercept and distributed radar systems, and joint sensing methodologies in complex multipath and cluttered environments. 
  I have authored or co-authored more than 70 papers published in leading journals and conferences, including IEEE TGRS, IEEE TAES, IEEE TVT, IEEE Radar Conference, IGARSS, and ICASSP. 
  I have also filed and been granted more than 20 patents.
  I currently serve as a Guest Editor for Remote Sensing and as a Youth Editorial Board Member for Modern Radar and the Journal of Naval Aviation University. I am also a reviewer for more than 20 journals, including IEEE TGRS, IEEE TAES, IEEE TAP, IEEE TMTT, IOTJ, IEEE TII, IEEE TMC, IEEE TCOM, IEEE AESM, and EAAI.
  </p>
