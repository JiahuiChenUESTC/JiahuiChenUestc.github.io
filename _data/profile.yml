short_bio: >-
  <p>
    I am an Associate Professor at the <a href="https://www.uestc.edu.cn/" target="_blank">University of Electronic Science and Technology of China (as of February 2026)</a>.
    My research interests include radar signal processing, distributed radar sensing, non-line-of-sight (NLOS) target detection and imaging,
    through-wall sensing, and sparse optimization methods for radar applications.
  </p>
  <p>
    My recent work focuses on NLOS target localization and imaging,  low-intercept and distributed radar systems,
    and joint sensing methodologies under complex multipath and cluttered environments.
  </p>

